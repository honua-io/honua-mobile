<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Honua Embed Example</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        color: #13212c;
        background: #f6f8fa;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
      }

      honua-map {
        height: 520px;
        --honua-map-accent: #1f7a8c;
      }
    </style>
  </head>
  <body>
    <main>
      <honua-map
        service-url="https://services.honua.example/FeatureServer"
        layer-ids="assets,work-orders"
        center="21.3069,-157.8583"
        zoom="12"
        basemap="streets"
        interactive
        search
        identify
        attribution="Example city GIS">
      </honua-map>
    </main>
    <script type="module" src="../../src/Honua.Embed/dist/index.js"></script>
  </body>
</html>
