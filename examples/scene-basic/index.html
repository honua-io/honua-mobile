<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Honua Scene Embed Example</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        color: #13212c;
        background: #f6f8fa;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        max-width: 1040px;
        margin: 0 auto;
      }

      honua-scene {
        height: 580px;
        --honua-scene-accent: #4fb4c8;
      }
    </style>
  </head>
  <body>
    <main>
      <honua-scene
        tileset-url="https://raw.githubusercontent.com/CesiumGS/3d-tiles-samples/main/1.0/TilesetWithDiscreteLOD/tileset.json"
        center="40.0,-75.0"
        height="220000"
        heading="0"
        pitch="-45">
      </honua-scene>
    </main>
    <script type="module" src="../../src/Honua.Embed/dist/index.js"></script>
  </body>
</html>
