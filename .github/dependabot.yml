version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dotnet-mobile:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/src/Honua.Embed"
    schedule:
      interval: "weekly"
    groups:
      embed:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
