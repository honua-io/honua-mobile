name: Publish Embed npm Package

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run validation only (skip publish)"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "mobile-embed-v*"

env:
  NODE_VERSION: "24.x"

jobs:
  package-smoke:
    name: Package Smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/Honua.Embed
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://npm.pkg.github.com"
          scope: "@honua"

      - name: Install dependencies
        run: npm ci

      - name: Validate package version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"

          if [[ -z "${package_version}" ]]; then
            echo "Could not resolve package version from package.json."
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            tag_version="${GITHUB_REF_NAME#mobile-embed-v}"
            if [[ "${tag_version}" != "${package_version}" ]]; then
              echo "Tag version (${tag_version}) does not match package.json version (${package_version})."
              exit 1
            fi
          fi

          echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Pack npm package
        shell: bash
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/npm-packages"
          npm pack --pack-destination "${GITHUB_WORKSPACE}/npm-packages"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: honua-mobile-embed-${{ github.run_id }}-packages
          path: npm-packages/*.tgz
          if-no-files-found: error
          retention-days: 90

      - name: Dry-run summary
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true' }}
        shell: bash
        run: |
          echo "Dry run complete. Built npm package:" >> "${GITHUB_STEP_SUMMARY}"
          ls -1 "${GITHUB_WORKSPACE}"/npm-packages/*.tgz >> "${GITHUB_STEP_SUMMARY}"

  publish:
    name: Publish to GitHub Packages
    needs: package-smoke
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v8
        with:
          name: honua-mobile-embed-${{ github.run_id }}-packages
          path: npm-packages

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://npm.pkg.github.com"
          scope: "@honua"

      - name: Publish to GitHub Packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          package="$(find npm-packages -maxdepth 1 -type f -name '*.tgz' | sort | head -n 1)"

          if [[ -z "${package}" ]]; then
            echo "No npm package artifact found."
            exit 1
          fi

          npm publish "${package}" --registry "https://npm.pkg.github.com"
